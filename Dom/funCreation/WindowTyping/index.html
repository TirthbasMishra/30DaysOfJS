<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Window Typing</title>
    <style>
      * {
        padding: 0;
        margin: 0;
        box-sizing: border-box;
        font-family: Arial, Helvetica, sans-serif;
      }

      html,
      body {
        width: 100%;
        height: 100%;
      }

      #main {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100%;
        width: 100%;
        background-color: #222;
      }

      h1 {
        color: #555;
        font-weight: 400;
        font-size: 10rem;
        letter-spacing: -1rem;
        user-select: none;
      }

      input{
        display: none;
      }

      #btn{
        padding: 12px 22px;
        background-color: rgb(17, 155, 114);
        color: white;
        border-radius: 10px;
        font-weight: bold;
      }
      #btn:hover{
        background-color: #0b7044;
      }
    </style>
  </head>
  <body>
    <div id="main">
      <!-- <h1>A</h1> -->
       <input type="file" name="" id="fileInp">
        <div id="btn">
          Upload File
        </div>
    </div>
    <script src="./sript.js"></script>
  </body>
</html>
